name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install workspace dependencies
        run: |
          npm ci
          npm i -w frontend --no-save @rollup/rollup-linux-x64-gnu
          npm run install:all

      - name: Build (typecheck + bundle)
        run: npm run build

